# KeenAI — P0 dev profiles (see docs/08-ROADMAP.md)
services:
  api:
    profiles: ["lite"]
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8090:8090"
    environment:
      DATABASE_URL: file:/data/keenai.db
      PORT: "8090"
    volumes:
      - keenai-data:/data

  postgres:
    profiles: ["standard", "full"]
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: keenai
      POSTGRES_PASSWORD: keenai
      POSTGRES_DB: keenai
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    profiles: ["standard", "full"]
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    profiles: ["standard", "full"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: keenai
      MINIO_ROOT_PASSWORD: keenai-secret

volumes:
  keenai-data:
  pg-data:
