# KeenAI — deployment profiles (see docs/08-ROADMAP.md · docs/ALPHA.md)
services:
  api:
    profiles: ["lite"]
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8090:8090"
    environment:
      NODE_ENV: production
      PORT: "8090"
      DATABASE_URL: file:/data/keenai.db
      JWT_SECRET: change-me-in-production-min-32-chars-long-please
      APP_URL: http://localhost:3000
      LOG_FORMAT: json
      # Demo seed for lite profile only — set KEENAI_AUTO_SEED=0 in production
      KEENAI_AUTO_SEED: ${KEENAI_AUTO_SEED:-1}
      WORKFLOW_SCAN_INTERVAL_MINUTES: "5"
    volumes:
      - keenai-data:/data
      - keenai-uploads:/app/data/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    profiles: ["lite"]
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8090
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

  inngest:
    profiles: ["inngest"]
    image: inngest/inngest:latest
    command: inngest dev -u http://api:8090/api/inngest
    ports:
      - "8288:8288"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    profiles: ["standard", "full"]
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: keenai
      POSTGRES_PASSWORD: keenai
      POSTGRES_DB: keenai
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    profiles: ["standard", "full"]
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    profiles: ["standard", "full"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: keenai
      MINIO_ROOT_PASSWORD: keenai-secret

volumes:
  keenai-data:
  keenai-uploads:
  pg-data:
