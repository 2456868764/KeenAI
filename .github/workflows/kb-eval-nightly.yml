name: KB Golden Eval (nightly)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  kb-golden-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        continue-on-error: true
      - run: pnpm install

      - name: Sprint 18 golden eval smoke
        run: pnpm kb:eval
